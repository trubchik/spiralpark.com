<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
<defs>

  <!-- Brushed gold: diagonal TL → BR -->
  <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#8a5810"/>
    <stop offset="22%"  stop-color="#c89030"/>
    <stop offset="48%"  stop-color="#f2dc5a"/>
    <stop offset="72%"  stop-color="#c09028"/>
    <stop offset="100%" stop-color="#7a4808"/>
  </linearGradient>

  <!-- Gold surface sheen — bright highlight in top-left corner -->
  <linearGradient id="goldSheen" x1="0.05" y1="0" x2="0.65" y2="0.85">
    <stop offset="0%"   stop-color="#fffce0" stop-opacity="0.45"/>
    <stop offset="35%"  stop-color="#f8e890" stop-opacity="0.10"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </linearGradient>

  <!-- Dark half: deep matte blue-black -->
  <linearGradient id="darkHalf" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#141424"/>
    <stop offset="100%" stop-color="#04040e"/>
  </linearGradient>

  <!-- Background centre glow -->
  <radialGradient id="bgGlow" cx="50%" cy="42%" r="40%">
    <stop offset="0%"   stop-color="#12123a" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#06060f" stop-opacity="0"/>
  </radialGradient>

  <!-- Blurred cyan glow for shadow shapes -->
  <filter id="cyanBlur" x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="13"/>
  </filter>

  <!-- Soft glow layer for the cut line -->
  <filter id="cutGlow">
    <feGaussianBlur stdDeviation="2.5"/>
  </filter>

</defs>

<!-- ══ BACKGROUND ══ -->
<rect width="480" height="480" fill="#060610"/>
<rect width="480" height="480" fill="url(#bgGlow)"/>

<!--
  DIAMOND MARK
  ┌ T(240, 40)
  ├ R(365,195)
  ├ B(240,350)
  └ L(115,195)
  Width = 250  Height = 310

  Diagonal cut (top-right edge at 60%, bottom-left edge at 40%):
    cut-TR = (315, 133)
    cut-LB = (165, 257)

  Gold half  (upper-left):  (240,40) (315,133) (165,257) (115,195)
  Dark half  (lower-right): (315,133) (365,195) (240,350) (165,257)
-->

<!-- ── CYAN SHADOW GLOW (offset +8,+8 behind dark half, blurred) ── -->
<polygon points="323,141 373,203 248,358 173,265"
         fill="#00d4ff" opacity="0.24" filter="url(#cyanBlur)"/>
<!-- wider, softer outer halo -->
<polygon points="333,151 385,215 258,370 183,277"
         fill="#0055aa" opacity="0.10" filter="url(#cyanBlur)"/>

<!-- ── DARK HALF (lower-right facet) ── -->
<polygon points="315,133 365,195 240,350 165,257"
         fill="url(#darkHalf)"/>

<!-- ── GOLD HALF (upper-left facet) ── -->
<polygon points="240,40 315,133 165,257 115,195"
         fill="url(#goldGrad)"/>
<!-- sheen overlay -->
<polygon points="240,40 315,133 165,257 115,195"
         fill="url(#goldSheen)"/>

<!-- ── EDGE DETAILS ── -->

<!-- Gold: left outer edge — bright highlight ridge -->
<line x1="240" y1="40"  x2="115" y2="195"
      stroke="#f8eecf" stroke-width="0.75" opacity="0.60"/>
<!-- Gold: top-right edge — faint secondary highlight -->
<line x1="240" y1="41"  x2="315" y2="133"
      stroke="#f8eecf" stroke-width="0.40" opacity="0.28"/>

<!-- Electric cyan cut line: glow layer first, then sharp hairline on top -->
<line x1="315" y1="133" x2="165" y2="257"
      stroke="#00e5ff" stroke-width="6"    opacity="0.13" filter="url(#cutGlow)"/>
<line x1="315" y1="133" x2="165" y2="257"
      stroke="#00e5ff" stroke-width="0.75" opacity="0.85"/>

<!-- Dark: right-bottom edge — faint cyan contour -->
<line x1="365" y1="195" x2="240" y2="350"
      stroke="#00a0c0" stroke-width="0.45" opacity="0.30"/>

<!-- Dark: bottom-left edge — even fainter -->
<line x1="240" y1="350" x2="165" y2="257"
      stroke="#005566" stroke-width="0.35" opacity="0.22"/>

<!-- ── WORDMARK ── -->
<text x="240" y="408"
      text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="15" font-weight="300" letter-spacing="8"
      fill="#7e7e98">MONEYSHADOW</text>

<!-- domain hint in subdued text -->
<text x="240" y="427"
      text-anchor="middle"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="9" font-weight="300" letter-spacing="5"
      fill="#3d3d58">.me</text>

<!-- Cyan accent dot — single point of light below text -->
<circle cx="240" cy="442" r="1.5" fill="#00e5ff" opacity="0.50"/>

</svg>
